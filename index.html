<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="콜라주">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>📸 사진 콜라주</title>
<!-- SW 강제 초기화: 구버전 캐시 완전 삭제 -->
<script>
(async()=>{
  if('serviceWorker' in navigator){
    // 모든 SW 등록 해제
    const regs = await navigator.serviceWorker.getRegistrations();
    await Promise.all(regs.map(r=>r.unregister()));
    // 브라우저 캐시 전부 삭제
    if(window.caches){
      const keys = await caches.keys();
      await Promise.all(keys.map(k=>caches.delete(k)));
    }
  }
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;
  --border2:rgba(255,255,255,0.18);
  --text:#f0f0f0;--text2:#888;
  --accent:#e8c96d;--accent-dim:rgba(232,201,109,0.15);
  --danger:#e05c5c;--radius:12px;--gap:3px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow:hidden}

.app{display:flex;flex-direction:column;height:100%;height:100dvh;max-width:430px;margin:0 auto}

/* ── HEADER ── */
.header{padding:50px 20px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header h1{font-size:20px;font-weight:700;letter-spacing:-.5px}
.header h1 span{color:var(--accent)}
.save-btn{background:var(--accent);color:#0f0f0f;border:none;border-radius:20px;padding:8px 16px;font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:flex;align-items:center;gap:5px;-webkit-appearance:none}
.save-btn:active{opacity:.8}
.save-btn svg{width:14px;height:14px}

/* ── MODE TABS (2 rows) ── */
.mode-section{padding:0 14px 10px;flex-shrink:0}
.mode-label{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:.5px;margin-bottom:5px}
.mode-row{display:flex;gap:6px;margin-bottom:6px}
.mode-chip{
  flex:1;border:1px solid var(--border2);border-radius:24px;
  background:var(--surface);color:var(--text2);
  font-size:12px;font-weight:500;font-family:'Noto Sans KR',sans-serif;
  padding:7px 2px;cursor:pointer;text-align:center;-webkit-appearance:none;transition:all .15s;
  white-space:nowrap;
}
.mode-chip.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-weight:700}
.mode-chip:active{transform:scale(.94)}
.mode-chip .chip-icon{display:block;font-size:9px;margin-bottom:1px;opacity:.7}

/* ── FRAME PANEL ── */
.frame-panel{
  padding:0 14px 8px;flex-shrink:0;
  display:flex;flex-direction:column;gap:7px;
}
.frame-row{display:flex;align-items:center;gap:10px}
.frame-label{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:.5px;min-width:38px;flex-shrink:0}
.thickness-slider{
  flex:1;-webkit-appearance:none;appearance:none;
  height:4px;border-radius:2px;background:var(--border2);outline:none;cursor:pointer;
}
.thickness-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:20px;height:20px;border-radius:50%;
  background:var(--accent);cursor:pointer;box-shadow:0 0 4px rgba(0,0,0,.4);
}
.thickness-val{font-size:11px;font-weight:700;color:var(--accent);min-width:26px;text-align:right}

/* Shape scroll row */
.shape-scroll{display:flex;gap:5px;overflow-x:auto;padding-bottom:3px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.shape-scroll::-webkit-scrollbar{display:none}
.shape-btn{
  flex-shrink:0;width:42px;height:34px;
  border:1.5px solid var(--border2);border-radius:8px;
  background:var(--surface);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-appearance:none;transition:all .15s;padding:0;
}
.shape-btn.active{border-color:var(--accent);background:var(--accent-dim)}
.shape-btn:active{transform:scale(.92)}
.shape-btn svg{width:30px;height:24px;display:block}

/* Color row */
.color-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:3px;-webkit-overflow-scrolling:touch;scrollbar-width:none;align-items:center}
.color-scroll::-webkit-scrollbar{display:none}
.color-swatch{
  flex-shrink:0;width:28px;height:28px;border-radius:50%;
  border:2px solid transparent;cursor:pointer;transition:all .15s;
  -webkit-appearance:none;
}
.color-swatch.active{border-color:var(--accent);transform:scale(1.2)}
.color-swatch:active{transform:scale(.9)}
/* Custom color picker button */
.color-custom{
  flex-shrink:0;width:28px;height:28px;border-radius:50%;
  border:2px solid var(--border2);cursor:pointer;
  background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red);
  position:relative;overflow:hidden;
}
.color-custom input[type=color]{
  position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;
}


.canvas-wrap{
  flex:1;padding:0 12px;min-height:0;
  display:flex;align-items:stretch;
  max-height:calc(100dvh - 260px);
}
.collage-canvas{
  width:100%;overflow:hidden;
  display:grid;
  gap:var(--frame-gap,3px);
  background:var(--frame-color,#ffffff);
  border-radius:var(--frame-outer-radius,12px);
  padding:var(--frame-padding,0px);
}
/* 상하형: 세로 비율 고정 */
.canvas-wrap.landscape{align-items:center}
.canvas-wrap.landscape .collage-canvas{
  width:100%;aspect-ratio:9/16;height:auto;align-self:center;
  max-height:100%;
}

/* ── CELL ── */
.cell{position:relative;background:var(--surface2);overflow:hidden;min-height:0;min-width:0;border-radius:var(--frame-cell-radius,0px)}
.cell-file{position:absolute;width:1px;height:1px;opacity:0;top:0;left:0;pointer-events:none}
.cell-label{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:2;
}
/* 사진이 있으면 label은 터치 이벤트를 받지 않음 — 핵심 수정 */
.cell.has-photo .cell-label{
  pointer-events:none;
}
.cell-placeholder{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--text2);border:2px dashed rgba(255,255,255,0.12);border-radius:8px;padding:8px;pointer-events:none;transition:all .15s}
.cell-placeholder svg{width:22px;height:22px;opacity:.5}
.cell-placeholder span{font-size:9px;font-weight:500}
.cell-label:active .cell-placeholder{border-color:var(--accent);color:var(--accent)}

/* Photo — uses object-position for drag repositioning */
.cell-photo{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;object-position:50% 50%;
  z-index:0;pointer-events:none;
  transition:object-position 0s;
}
.cell.has-photo .cell-placeholder{display:none}
.cell.has-photo .cell-label{background:transparent}

/* ── DRAG MODE overlay ── */
.cell.dragging .cell-label{cursor:move !important}
.drag-hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(232,201,109,.92);color:#0f0f0f;
  font-size:11px;font-weight:700;padding:6px 12px;border-radius:20px;
  z-index:8;pointer-events:none;display:none;white-space:nowrap;
}
.cell.drag-active .drag-hint{display:block}

/* Remove button */
.remove-btn{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:14px;line-height:1;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:10;-webkit-appearance:none}
.remove-btn.show{display:flex}

/* Caption */
.caption-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.75));padding:18px 8px 7px;display:none;z-index:5}
.caption-overlay.visible{display:block}
.caption-input{width:100%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:6px;color:#fff;font-size:11px;font-family:'Noto Sans KR',sans-serif;padding:4px 7px;outline:none;-webkit-appearance:none}
.caption-input::placeholder{color:rgba(255,255,255,.4)}
.caption-badge{position:absolute;top:5px;left:5px;background:rgba(232,201,109,.9);color:#0f0f0f;font-size:9px;font-weight:700;padding:2px 5px;border-radius:6px;display:none;z-index:6}
.caption-badge.show{display:block}

/* ── TOOLBAR ── */
.toolbar{padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));display:flex;gap:6px;flex-shrink:0}
.tool-btn{flex:1;background:var(--surface);border:1px solid var(--border2);border-radius:10px;color:var(--text2);font-size:10px;font-weight:500;font-family:'Noto Sans KR',sans-serif;padding:9px 3px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;-webkit-appearance:none;transition:all .15s}
.tool-btn svg{width:18px;height:18px}
.tool-btn:active{background:var(--surface2);transform:scale(.94)}
.tool-btn.danger{color:var(--danger);border-color:rgba(224,92,92,.3)}
.tool-btn.active-mode{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

/* ── FULLSCREEN PREVIEW ── */
.fullscreen{
  position:fixed;inset:0;background:#000;z-index:300;
  display:none;align-items:center;justify-content:center;flex-direction:column;
}
.fullscreen.show{display:flex}
.fullscreen-canvas{
  width:100%;height:100%;
  display:grid;gap:var(--gap);
  background:#111;
}
/* 상하형 fullscreen */
.fullscreen.ls .fullscreen-canvas{width:60%;height:auto;aspect-ratio:9/16;align-self:center}

.fullscreen-photo{width:100%;height:100%;object-fit:cover;object-position:50% 50%;display:block}
.fullscreen-caption{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.75));
  padding:18px 10px 8px;
  font-size:13px;color:#fff;font-weight:500;
  display:none;
}
.fullscreen-caption.has-text{display:block}
.fs-close{
  position:fixed;top:max(50px,env(safe-area-inset-top));right:18px;
  width:36px;height:36px;border-radius:50%;
  background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.3);
  color:#fff;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  z-index:301;-webkit-appearance:none;
}
.fs-save{
  position:fixed;bottom:max(30px,env(safe-area-inset-bottom));right:18px;
  background:var(--accent);color:#0f0f0f;border:none;border-radius:20px;
  padding:10px 20px;font-size:13px;font-weight:700;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;
  z-index:301;-webkit-appearance:none;
}

/* Toast / Saving */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(232,201,109,.95);color:#0f0f0f;font-size:13px;font-weight:700;padding:10px 20px;border-radius:30px;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap;z-index:400}
.toast.show{opacity:1}
.saving-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:500}
.saving-overlay.show{display:flex}
.saving-overlay p{color:var(--accent);font-size:15px;font-weight:500}
.spinner{width:40px;height:40px;border:3px solid var(--accent-dim);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>📸 사진 <span>콜라주</span></h1>
    <button class="save-btn" onclick="saveCollage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      저장
    </button>
  </div>

  <!-- Mode selector: 2 rows -->
  <div class="mode-section">
    <div class="mode-label">세로형</div>
    <div class="mode-row" id="portraitRow">
      <button class="mode-chip" data-mode="p1" onclick="setMode('p1')">
        <span class="chip-icon">▮</span>1장
      </button>
      <button class="mode-chip active" data-mode="p2" onclick="setMode('p2')">
        <span class="chip-icon">▮▮</span>2장
      </button>
      <button class="mode-chip" data-mode="p3" onclick="setMode('p3')">
        <span class="chip-icon">▮▮▮</span>3장
      </button>
      <button class="mode-chip" data-mode="p4" onclick="setMode('p4')">
        <span class="chip-icon">▪▪▪▪</span>4장
      </button>
      <button class="mode-chip" data-mode="p5" onclick="setMode('p5')">
        <span class="chip-icon">▪▪▪▪▪</span>5장
      </button>
    </div>
    <div class="mode-label">상하형 (가로)</div>
    <div class="mode-row">
      <button class="mode-chip" data-mode="l2" onclick="setMode('l2')">
        <span class="chip-icon">☰☰</span>2장 상하
      </button>
      <button class="mode-chip" data-mode="l3" onclick="setMode('l3')">
        <span class="chip-icon">☰☰☰</span>3장 상하
      </button>
      <button class="mode-chip" style="flex:0.5;opacity:0;pointer-events:none"></button>
      <button class="mode-chip" style="flex:0.5;opacity:0;pointer-events:none"></button>
    </div>
  </div>

  <!-- Frame control panel -->
  <div class="frame-panel">
    <!-- 두께 슬라이더 -->
    <div class="frame-row">
      <span class="frame-label">두께</span>
      <input class="thickness-slider" type="range" min="0" max="24" value="3" id="thickSlider" oninput="setThickness(this.value)">
      <span class="thickness-val" id="thickVal">3</span>
    </div>

    <!-- 모양 선택 (12종, 가로 스크롤) -->
    <div class="frame-row">
      <span class="frame-label">모양</span>
      <div class="shape-scroll" id="shapeRow">
        <!-- 직선 -->
        <button class="shape-btn active" data-shape="sharp" onclick="setShape('sharp')" title="직선">
          <svg viewBox="0 0 30 24"><rect x="1" y="2" width="12" height="20" fill="#aaa" rx="0"/><rect x="17" y="2" width="12" height="20" fill="#aaa" rx="0"/></svg>
        </button>
        <!-- 소프트 -->
        <button class="shape-btn" data-shape="soft" onclick="setShape('soft')" title="소프트">
          <svg viewBox="0 0 30 24"><rect x="1" y="2" width="12" height="20" fill="#aaa" rx="4"/><rect x="17" y="2" width="12" height="20" fill="#aaa" rx="4"/></svg>
        </button>
        <!-- 라운드 -->
        <button class="shape-btn" data-shape="round" onclick="setShape('round')" title="라운드">
          <svg viewBox="0 0 30 24"><rect x="1" y="2" width="12" height="20" fill="#aaa" rx="8"/><rect x="17" y="2" width="12" height="20" fill="#aaa" rx="8"/></svg>
        </button>
        <!-- 원형 -->
        <button class="shape-btn" data-shape="circle" onclick="setShape('circle')" title="원형">
          <svg viewBox="0 0 30 24"><ellipse cx="7.5" cy="12" rx="6.5" ry="10" fill="#aaa"/><ellipse cx="22.5" cy="12" rx="6.5" ry="10" fill="#aaa"/></svg>
        </button>
        <!-- 다이아몬드 -->
        <button class="shape-btn" data-shape="diamond" onclick="setShape('diamond')" title="다이아몬드">
          <svg viewBox="0 0 30 24"><polygon points="7,2 13,12 7,22 1,12" fill="#aaa"/><polygon points="23,2 29,12 23,22 17,12" fill="#aaa"/></svg>
        </button>
        <!-- 아치 -->
        <button class="shape-btn" data-shape="arch" onclick="setShape('arch')" title="아치">
          <svg viewBox="0 0 30 24"><path d="M1,22 L1,10 Q7,2 13,10 L13,22 Z" fill="#aaa"/><path d="M17,22 L17,10 Q23,2 29,10 L29,22 Z" fill="#aaa"/></svg>
        </button>
        <!-- 물방울 -->
        <button class="shape-btn" data-shape="drop" onclick="setShape('drop')" title="물방울">
          <svg viewBox="0 0 30 24"><path d="M7,22 Q1,16 1,10 Q1,2 7,2 Q13,2 13,10 Q13,16 7,22Z" fill="#aaa"/><path d="M23,22 Q17,16 17,10 Q17,2 23,2 Q29,2 29,10 Q29,16 23,22Z" fill="#aaa"/></svg>
        </button>
        <!-- 육각형 -->
        <button class="shape-btn" data-shape="hex" onclick="setShape('hex')" title="육각형">
          <svg viewBox="0 0 30 24"><polygon points="7,2 13,5.5 13,18.5 7,22 1,18.5 1,5.5" fill="#aaa"/><polygon points="23,2 29,5.5 29,18.5 23,22 17,18.5 17,5.5" fill="#aaa"/></svg>
        </button>
        <!-- 별 -->
        <button class="shape-btn" data-shape="star" onclick="setShape('star')" title="별">
          <svg viewBox="0 0 30 24"><polygon points="7,2 8.5,8 14,8 9.5,12 11,18 7,14.5 3,18 4.5,12 0,8 5.5,8" fill="#aaa"/><polygon points="23,2 24.5,8 30,8 25.5,12 27,18 23,14.5 19,18 20.5,12 16,8 21.5,8" fill="#aaa"/></svg>
        </button>
        <!-- 하트 -->
        <button class="shape-btn" data-shape="heart" onclick="setShape('heart')" title="하트">
          <svg viewBox="0 0 30 24"><path d="M7,20 Q0,14 1,8 Q2,2 7,4 Q12,2 13,8 Q14,14 7,20Z" fill="#aaa"/><path d="M23,20 Q16,14 17,8 Q18,2 23,4 Q28,2 29,8 Q30,14 23,20Z" fill="#aaa"/></svg>
        </button>
        <!-- 방패 -->
        <button class="shape-btn" data-shape="shield" onclick="setShape('shield')" title="방패">
          <svg viewBox="0 0 30 24"><path d="M7,2 L13,4 L13,14 Q13,20 7,22 Q1,20 1,14 L1,4Z" fill="#aaa"/><path d="M23,2 L29,4 L29,14 Q29,20 23,22 Q17,20 17,14 L17,4Z" fill="#aaa"/></svg>
        </button>
        <!-- 깃발 -->
        <button class="shape-btn" data-shape="flag" onclick="setShape('flag')" title="깃발">
          <svg viewBox="0 0 30 24"><polygon points="1,2 13,2 10,12 13,22 1,22" fill="#aaa"/><polygon points="17,2 29,2 26,12 29,22 17,22" fill="#aaa"/></svg>
        </button>
      </div>
    </div>

    <!-- 컬러 선택 -->
    <div class="frame-row">
      <span class="frame-label">컬러</span>
      <div class="color-scroll" id="colorRow">
        <button class="color-swatch active" data-color="#ffffff" style="background:#ffffff" onclick="setFrameColor('#ffffff')" title="흰색"></button>
        <button class="color-swatch" data-color="#000000" style="background:#000000" onclick="setFrameColor('#000000')" title="검정"></button>
        <button class="color-swatch" data-color="#e8c96d" style="background:#e8c96d" onclick="setFrameColor('#e8c96d')" title="골드"></button>
        <button class="color-swatch" data-color="#c0a060" style="background:linear-gradient(135deg,#f5e6c0,#c0a060,#8b6914)" onclick="setFrameColor('linear-gradient(135deg,#f5e6c0,#c0a060,#8b6914)')" title="골드 그라디언트"></button>
        <button class="color-swatch" data-color="#e8e8e8" style="background:linear-gradient(135deg,#ffffff,#c8c8c8,#a0a0a0)" onclick="setFrameColor('linear-gradient(135deg,#ffffff,#c8c8c8,#a0a0a0)')" title="실버 그라디언트"></button>
        <button class="color-swatch" data-color="#ff6b9d" style="background:#ff6b9d" onclick="setFrameColor('#ff6b9d')" title="핑크"></button>
        <button class="color-swatch" data-color="#ff4444" style="background:#ff4444" onclick="setFrameColor('#ff4444')" title="빨강"></button>
        <button class="color-swatch" data-color="#ff9500" style="background:#ff9500" onclick="setFrameColor('#ff9500')" title="오렌지"></button>
        <button class="color-swatch" data-color="#ffdd00" style="background:#ffdd00" onclick="setFrameColor('#ffdd00')" title="노랑"></button>
        <button class="color-swatch" data-color="#4cd964" style="background:#4cd964" onclick="setFrameColor('#4cd964')" title="초록"></button>
        <button class="color-swatch" data-color="#007aff" style="background:#007aff" onclick="setFrameColor('#007aff')" title="파랑"></button>
        <button class="color-swatch" data-color="#5856d6" style="background:#5856d6" onclick="setFrameColor('#5856d6')" title="보라"></button>
        <button class="color-swatch" data-color="#ff2d55" style="background:linear-gradient(135deg,#ff6b9d,#ff2d55,#c0392b)" onclick="setFrameColor('linear-gradient(135deg,#ff6b9d,#ff2d55,#c0392b)')" title="핑크-레드 그라디언트"></button>
        <button class="color-swatch" data-color="#007aff-grad" style="background:linear-gradient(135deg,#a8edea,#007aff,#5856d6)" onclick="setFrameColor('linear-gradient(135deg,#a8edea,#007aff,#5856d6)')" title="블루 그라디언트"></button>
        <button class="color-swatch" data-color="#sunrise" style="background:linear-gradient(135deg,#f7971e,#ffd200)" onclick="setFrameColor('linear-gradient(135deg,#f7971e,#ffd200)')" title="선라이즈"></button>
        <button class="color-swatch" data-color="#mint" style="background:linear-gradient(135deg,#43e97b,#38f9d7)" onclick="setFrameColor('linear-gradient(135deg,#43e97b,#38f9d7)')" title="민트"></button>
        <!-- 직접 색상 선택 -->
        <div class="color-custom" title="직접 선택">
          <input type="color" id="customColor" value="#ffffff" oninput="setFrameColor(this.value);updateCustomSwatch(this.value)">
        </div>
      </div>
    </div>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <div class="collage-canvas" id="canvas"></div>
  </div>

  <div class="toolbar">
    <button class="tool-btn" id="btnDrag" onclick="toggleDragMode()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/>
        <polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/>
        <line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/>
      </svg>
      위치조정
    </button>
    <button class="tool-btn" onclick="toggleCaptions()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      설명
    </button>
    <button class="tool-btn" onclick="openFullscreen()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
      </svg>
      전체보기
    </button>
    <button class="tool-btn" onclick="setBg()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/>
      </svg>
      배경
    </button>
    <button class="tool-btn danger" onclick="resetAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
      </svg>
      초기화
    </button>
  </div>
</div>

<!-- FULLSCREEN PREVIEW -->
<div class="fullscreen" id="fullscreen">
  <button class="fs-close" onclick="closeFullscreen()">✕</button>
  <div class="fullscreen-canvas" id="fsCanvas"></div>
  <button class="fs-save" onclick="saveCollage()">💾 저장하기</button>
</div>

<div class="toast" id="toast"></div>
<div class="saving-overlay" id="savingOverlay">
  <div class="spinner"></div>
  <p>저장 중...</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// ── STATE ──
let currentMode = 'p2';
let captionMode = false;
let dragMode = false;
let bgIdx = 0;
const bgColors = ['#111111','#ffffff','#1a1a2e','#2d1b1b','#1b2d1b'];
const bgLabels = ['검정','흰색','다크블루','다크레드','다크그린'];

// ── FRAME STATE ──
let frameThickness = 3;
let frameShape = 'sharp';
let frameColor = '#ffffff';

// Shape definitions
const SHAPES = {
  sharp:   { outerR:'12px', cellR:'0px',  clip:'' },
  soft:    { outerR:'16px', cellR:'8px',  clip:'' },
  round:   { outerR:'24px', cellR:'18px', clip:'' },
  circle:  { outerR:'28px', cellR:'50%',  clip:'' },
  diamond: { outerR:'4px',  cellR:'0px',  clip:'polygon(50% 0%,100% 50%,50% 100%,0% 50%)' },
  arch:    { outerR:'4px',  cellR:'0px',  clip:'polygon(0% 100%,0% 40%,10% 20%,30% 5%,50% 0%,70% 5%,90% 20%,100% 40%,100% 100%)' },
  drop:    { outerR:'4px',  cellR:'0px',  clip:'polygon(50% 0%,80% 10%,100% 35%,100% 70%,80% 90%,50% 100%,20% 90%,0% 70%,0% 35%,20% 10%)' },
  hex:     { outerR:'4px',  cellR:'0px',  clip:'polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%)' },
  star:    { outerR:'4px',  cellR:'0px',  clip:'polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)' },
  heart:   { outerR:'4px',  cellR:'0px',  clip:'polygon(50% 30%,62% 15%,75% 10%,88% 15%,95% 28%,95% 42%,80% 60%,65% 75%,50% 88%,35% 75%,20% 60%,5% 42%,5% 28%,12% 15%,25% 10%,38% 15%)' },
  shield:  { outerR:'4px',  cellR:'0px',  clip:'polygon(15% 0%,85% 0%,100% 15%,100% 55%,50% 100%,0% 55%,0% 15%)' },
  flag:    { outerR:'4px',  cellR:'0px',  clip:'polygon(0% 0%,100% 0%,85% 50%,100% 100%,0% 100%)' },
};

function applyFrame() {
  const s = SHAPES[frameShape];
  const gap = frameThickness + 'px';
  const pad = frameThickness > 0 ? frameThickness + 'px' : '0px';
  canvas.style.setProperty('--frame-gap', gap);
  canvas.style.background = frameColor;
  canvas.style.setProperty('--frame-outer-radius', s.outerR);
  canvas.style.setProperty('--frame-padding', pad);
  canvas.style.setProperty('--frame-cell-radius', s.cellR);
  canvas.querySelectorAll('.cell').forEach(cell => {
    cell.style.clipPath = s.clip || '';
    cell.style.borderRadius = s.cellR;
  });
}

function setThickness(val) {
  frameThickness = parseInt(val);
  document.getElementById('thickVal').textContent = val;
  applyFrame();
}

function setShape(shape) {
  frameShape = shape;
  document.querySelectorAll('.shape-btn').forEach(b => b.classList.toggle('active', b.dataset.shape === shape));
  applyFrame();
}

function setFrameColor(color) {
  frameColor = color;
  document.querySelectorAll('.color-swatch').forEach(b => b.classList.toggle('active', b.dataset.color === color));
  applyFrame();
}

function updateCustomSwatch(hex) {
  frameColor = hex;
  document.querySelectorAll('.color-swatch').forEach(b => b.classList.remove('active'));
  applyFrame();
}

// Photo state: {src, posX(%), posY(%)}
let photos = {}; // key: idx

const canvas = document.getElementById('canvas');
const canvasWrap = document.getElementById('canvasWrap');

// ── MODE DEFINITIONS ──
const MODES = {
  p1: { count:1, landscape:false, grid:{ cols:'1fr', rows:'1fr', areas:'' } },
  p2: { count:2, landscape:false, grid:{ cols:'1fr 1fr', rows:'1fr',    areas:'' } },
  p3: { count:3, landscape:false, grid:{ cols:'1fr 1fr 1fr', rows:'1fr', areas:'' } },
  p4: { count:4, landscape:false, grid:{ cols:'1fr 1fr', rows:'1fr 1fr', areas:'' } },
  p5: { count:5, landscape:false, grid:{ cols:'1fr 1fr 1fr', rows:'1fr 1fr', areas:'"a a b" "c d e"' } },
  l2: { count:2, landscape:true,  grid:{ cols:'1fr', rows:'1fr 1fr',       areas:'' } },
  l3: { count:3, landscape:true,  grid:{ cols:'1fr', rows:'1fr 1fr 1fr',   areas:'' } },
};
const AREA_NAMES = ['a','b','c','d','e'];

function applyGrid(target) {
  const m = MODES[currentMode];
  const s = target.style;
  s.gridTemplateColumns = m.grid.cols;
  s.gridTemplateRows   = m.grid.rows;
  s.gridTemplateAreas  = m.grid.areas || 'none';
}

// ── BUILD GRID ──
function buildGrid() {
  canvas.innerHTML = '';
  photos = {};
  const m = MODES[currentMode];
  applyGrid(canvas);

  // landscape: fixed aspect ratio
  if (m.landscape) {
    canvasWrap.classList.add('landscape');
  } else {
    canvasWrap.classList.remove('landscape');
  }

  for (let i = 0; i < m.count; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.id = 'cell-' + i;
    if (currentMode === 'p5') cell.style.gridArea = AREA_NAMES[i];

    const fid = 'fi-' + i;
    cell.innerHTML = `
      <input class="cell-file" type="file" accept="image/*" id="${fid}" onchange="onFile(event,${i})">
      <label class="cell-label" for="${fid}" onclick="labelClick(event,${i})">
        <div class="cell-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <span>탭하여 추가</span>
        </div>
      </label>
      <div class="drag-hint">↔ 드래그로 위치 조정</div>
      <button class="remove-btn" id="rm-${i}" onclick="removePhoto(${i},event)">✕</button>
      <div class="caption-badge" id="badge-${i}">편집중</div>
      <div class="caption-overlay" id="cap-${i}">
        <input class="caption-input" type="text" placeholder="설명을 입력하세요..."
          enterkeyhint="done"
          onkeydown="if(event.key==='Enter')this.blur()"
          onclick="event.stopPropagation()">
      </div>
    `;
    canvas.appendChild(cell);
    // 사진 있는 셀 탭 → remove 버튼
    cell.addEventListener('click', () => {
      if (cell.classList.contains('has-photo')) cellTap(i);
    });
    attachDragHandlers(cell, i);
  }
  // 액자 스타일 적용
  applyFrame();
}

// ── FILE HANDLING ──
function labelClick(e, idx) {
  // label은 사진 없을 때만 파일 피커 오픈
  // 사진 있으면 pointer-events:none이라 이 함수 자체가 안 불림
  if (dragMode) { e.preventDefault(); return; }
}

// 사진 있는 셀 탭 → remove 버튼 토글 (cell 자체에 등록)
function cellTap(idx) {
  if (dragMode) return;
  const rm = document.getElementById('rm-' + idx);
  const was = rm.classList.contains('show');
  document.querySelectorAll('.remove-btn').forEach(b => b.classList.remove('show'));
  if (!was) rm.classList.add('show');
}

function onFile(e, idx) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    photos[idx] = { src: ev.target.result, posX: 50, posY: 50 };
    renderPhoto(idx);
    const cell = document.getElementById('cell-' + idx);
    cell.classList.add('has-photo');
    if (captionMode) {
      document.getElementById('cap-' + idx).classList.add('visible');
      document.getElementById('badge-' + idx).classList.add('show');
    }
    e.target.value = '';
  };
  reader.readAsDataURL(file);
}

function renderPhoto(idx) {
  const cell = document.getElementById('cell-' + idx);
  if (!cell) return;
  const p = photos[idx];
  let img = cell.querySelector('.cell-photo');
  if (!img) {
    img = document.createElement('img');
    img.className = 'cell-photo';
    cell.insertBefore(img, cell.firstChild);
  }
  img.src = p.src;
  img.style.objectPosition = p.posX + '% ' + p.posY + '%';
}

function removePhoto(idx, e) {
  e.preventDefault(); e.stopPropagation();
  delete photos[idx];
  const cell = document.getElementById('cell-' + idx);
  const img = cell.querySelector('.cell-photo');
  if (img) img.remove();
  cell.classList.remove('has-photo', 'drag-active');
  document.getElementById('cap-' + idx).classList.remove('visible');
  document.getElementById('cap-' + idx).querySelector('input').value = '';
  document.getElementById('badge-' + idx).classList.remove('show');
  document.getElementById('rm-' + idx).classList.remove('show');
}

// ── DRAG TO REPOSITION ──
function attachDragHandlers(cell, idx) {
  let dragging = false;
  let startX, startY, startPosX, startPosY;
  let moved = false;

  function getXY(ev) {
    const t = ev.touches ? ev.touches[0] : ev;
    return { x: t.clientX, y: t.clientY };
  }

  function onStart(ev) {
    if (!dragMode) return;
    if (!photos[idx]) return;
    dragging = true; moved = false;
    const pt = getXY(ev);
    startX = pt.x; startY = pt.y;
    startPosX = photos[idx].posX;
    startPosY = photos[idx].posY;
    ev.preventDefault();
  }

  function onMove(ev) {
    if (!dragging || !photos[idx]) return;
    const pt = getXY(ev);
    const dx = pt.x - startX;
    const dy = pt.y - startY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;

    const rect = cell.getBoundingClientRect();
    // Sensitivity: 1px drag = how many % position change
    const sensX = 100 / rect.width * 0.8;
    const sensY = 100 / rect.height * 0.8;

    photos[idx].posX = Math.max(0, Math.min(100, startPosX - dx * sensX));
    photos[idx].posY = Math.max(0, Math.min(100, startPosY - dy * sensY));

    const img = cell.querySelector('.cell-photo');
    if (img) img.style.objectPosition = photos[idx].posX + '% ' + photos[idx].posY + '%';
    ev.preventDefault();
  }

  function onEnd(ev) {
    dragging = false;
  }

  // Touch
  cell.addEventListener('touchstart', onStart, { passive: false });
  cell.addEventListener('touchmove',  onMove,  { passive: false });
  cell.addEventListener('touchend',   onEnd);
  // Mouse (desktop)
  cell.addEventListener('mousedown', onStart);
  window.addEventListener('mousemove', ev => { if (dragging && cell.contains(ev.target) || dragging) onMove(ev); });
  window.addEventListener('mouseup', onEnd);
}

// ── DRAG MODE TOGGLE ──
function toggleDragMode() {
  dragMode = !dragMode;
  const btn = document.getElementById('btnDrag');
  btn.classList.toggle('active-mode', dragMode);
  canvas.querySelectorAll('.cell').forEach(c => {
    c.classList.toggle('drag-active', dragMode && c.classList.contains('has-photo'));
  });
  showToast(dragMode ? '↔ 드래그로 사진 위치 조정' : '✅ 위치 조정 완료');
}

// ── FULLSCREEN PREVIEW ──
function openFullscreen() {
  const m = MODES[currentMode];
  const fs = document.getElementById('fullscreen');
  const fsc = document.getElementById('fsCanvas');

  fsc.innerHTML = '';
  applyGrid(fsc);

  if (m.landscape) {
    fs.classList.add('ls');
    fsc.style.width = '60%';
    fsc.style.height = 'auto';
    fsc.style.aspectRatio = '9/16';
  } else {
    fs.classList.remove('ls');
    fsc.style.width = '100%';
    fsc.style.height = '100%';
    fsc.style.aspectRatio = '';
  }

  for (let i = 0; i < m.count; i++) {
    const slot = document.createElement('div');
    slot.style.cssText = 'position:relative;overflow:hidden;min-height:0;min-width:0;';
    if (currentMode === 'p5') slot.style.gridArea = AREA_NAMES[i];

    if (photos[i]) {
      const img = document.createElement('img');
      img.className = 'fullscreen-photo';
      img.src = photos[i].src;
      img.style.objectPosition = photos[i].posX + '% ' + photos[i].posY + '%';
      slot.appendChild(img);

      // Caption
      const capInput = document.querySelector('#cap-' + i + ' input');
      const capText = capInput ? capInput.value.trim() : '';
      if (capText) {
        const cap = document.createElement('div');
        cap.className = 'fullscreen-caption has-text';
        cap.textContent = capText;
        slot.appendChild(cap);
      }
    } else {
      slot.style.background = 'var(--surface2)';
    }
    fsc.appendChild(slot);
  }

  fs.classList.add('show');
}

function closeFullscreen() {
  document.getElementById('fullscreen').classList.remove('show');
}

// ── MODE / SETTINGS ──
function setMode(m) {
  currentMode = m;
  captionMode = false;
  dragMode = false;
  document.getElementById('btnDrag').classList.remove('active-mode');
  document.querySelectorAll('.mode-chip').forEach(c => c.classList.toggle('active', c.dataset.mode === m));
  buildGrid();
}

function toggleCaptions() {
  captionMode = !captionMode;
  const count = MODES[currentMode].count;
  for (let i = 0; i < count; i++) {
    const cell = document.getElementById('cell-' + i);
    if (!cell.classList.contains('has-photo')) continue;
    document.getElementById('cap-' + i).classList.toggle('visible', captionMode);
    document.getElementById('badge-' + i).classList.toggle('show', captionMode);
  }
  showToast(captionMode ? '✏️ 설명 편집 모드' : '✅ 편집 완료');
}

function setBg() {
  bgIdx = (bgIdx + 1) % bgColors.length;
  canvas.style.background = bgColors[bgIdx];
  showToast('배경: ' + bgLabels[bgIdx]);
}

function resetAll() {
  if (!confirm('모든 사진을 초기화할까요?')) return;
  captionMode = false; dragMode = false; bgIdx = 0;
  frameThickness = 3; frameShape = 'sharp'; frameColor = '#ffffff';
  document.getElementById('thickSlider').value = 3;
  document.getElementById('thickVal').textContent = '3';
  document.querySelectorAll('.shape-btn').forEach(b => b.classList.toggle('active', b.dataset.shape === 'sharp'));
  document.querySelectorAll('.color-swatch').forEach(b => b.classList.toggle('active', b.dataset.color === '#ffffff'));
  canvas.style.background = '';
  document.getElementById('btnDrag').classList.remove('active-mode');
  buildGrid();
  showToast('🔄 초기화 완료');
}

// ── SAVE ──
async function saveCollage() {
  if (!Object.keys(photos).length) { showToast('⚠️ 먼저 사진을 추가하세요'); return; }

  // Build a clean offscreen canvas for html2canvas
  const m = MODES[currentMode];
  const W = 1200, H = m.landscape ? Math.round(W * 16/9) : Math.round(W * 4/3);

  const offscreen = document.createElement('div');
  const s = SHAPES[frameShape];
  const fgap = frameThickness + 'px';
  const fpad = frameThickness > 0 ? frameThickness + 'px' : '0px';
  offscreen.style.cssText = `position:fixed;left:-9999px;top:0;width:${W}px;height:${H}px;display:grid;gap:${fgap};padding:${fpad};background:${frameColor};border-radius:${s.outerR};overflow:hidden;`;
  offscreen.style.gridTemplateColumns = MODES[currentMode].grid.cols;
  offscreen.style.gridTemplateRows    = MODES[currentMode].grid.rows;
  if (MODES[currentMode].grid.areas) offscreen.style.gridTemplateAreas = MODES[currentMode].grid.areas;

  for (let i = 0; i < m.count; i++) {
    const slot = document.createElement('div');
    slot.style.cssText = `position:relative;overflow:hidden;min-height:0;min-width:0;border-radius:${s.cellR};clip-path:${s.clip||''};`;
    if (currentMode === 'p5') slot.style.gridArea = AREA_NAMES[i];

    if (photos[i]) {
      const img = document.createElement('img');
      img.style.cssText = `position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:${photos[i].posX}% ${photos[i].posY}%;`;
      img.src = photos[i].src;
      slot.appendChild(img);

      const capInput = document.querySelector('#cap-' + i + ' input');
      const capText = capInput ? capInput.value.trim() : '';
      if (capText) {
        const cap = document.createElement('div');
        cap.style.cssText = 'position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.75));padding:30px 12px 10px;color:#fff;font-size:16px;font-weight:500;';
        cap.textContent = capText;
        slot.appendChild(cap);
      }
    } else {
      slot.style.background = '#1a1a1a';
    }
    offscreen.appendChild(slot);
  }
  document.body.appendChild(offscreen);

  document.getElementById('savingOverlay').classList.add('show');
  await new Promise(r => setTimeout(r, 150));

  try {
    const cvs = await html2canvas(offscreen, {
      useCORS: true, scale: 1,
      width: W, height: H,
      backgroundColor: canvas.style.background || '#111111',
      logging: false
    });
    const blob = await new Promise(r => cvs.toBlob(r, 'image/jpeg', 0.95));
    const file = new File([blob], 'collage.jpg', {type:'image/jpeg'});
    if (navigator.share && navigator.canShare({files:[file]})) {
      await navigator.share({files:[file], title:'사진 콜라주'});
    } else {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = 'collage.jpg'; a.click();
    }
    showToast('🎉 저장 완료!');
  } catch(err) {
    if (err.name !== 'AbortError') showToast('저장 실패. 다시 시도하세요.');
  } finally {
    document.body.removeChild(offscreen);
    document.getElementById('savingOverlay').classList.remove('show');
  }
}

// ── UTILS ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2200);
}

document.addEventListener('click', e => {
  if (!e.target.closest('.cell')) {
    document.querySelectorAll('.remove-btn').forEach(b => b.classList.remove('show'));
  }
});

// SW 새로 등록 (캐시 없는 버전)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js?v=7').catch(()=>{}));
}

buildGrid();
</script>
</body>
</html>
